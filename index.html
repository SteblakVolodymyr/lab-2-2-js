<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моделювання руху тіла, кинутого під кутом до горизонту</title>
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>ЛР 2.2. Моделювання руху тіла, кинутого під кутом до горизонту</h1>
      <p>
        Програма обчислює основні параметри польоту та будує траєкторію руху.
      </p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Вхідні дані</h2>
        <form id="projectileForm" class="form-grid">
          <label>
            Початкова швидкість v₀ (м/с)
            <input type="number" id="speed" min="0.1" step="0.1" value="25" required />
          </label>

          <label>
            Кут кидання α (°)
            <input type="number" id="angle" min="0.1" max="89.9" step="0.1" value="45" required />
          </label>

          <label>
            Початкова висота h₀ (м)
            <input type="number" id="height" min="0" step="0.1" value="0" required />
          </label>

          <label>
            Прискорення вільного падіння g (м/с²)
            <input type="number" id="gravity" min="0.1" step="0.01" value="9.81" required />
          </label>

          <div class="actions">
            <button type="submit">Розрахувати</button>
            <button type="button" id="resetBtn" class="secondary">Скинути</button>
          </div>
        </form>

        <div id="message" class="message"></div>
      </section>

      <section class="card">
        <h2>Результати</h2>
        <div id="results" class="results-grid">
          <div class="result-item"><span>Час польоту</span><strong id="flightTime">-</strong></div>
          <div class="result-item"><span>Дальність польоту</span><strong id="range">-</strong></div>
          <div class="result-item"><span>Максимальна висота</span><strong id="maxHeight">-</strong></div>
          <div class="result-item"><span>Кроків у таблиці</span><strong id="stepsCount">-</strong></div>
        </div>
      </section>

      <section class="card full-width">
        <h2>Траєкторія руху</h2>
        <canvas id="trajectoryCanvas" width="900" height="420"></canvas>
      </section>

      <section class="card full-width">
        <h2>Таблиця моделювання</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>№</th>
                <th>t (с)</th>
                <th>x (м)</th>
                <th>y (м)</th>
              </tr>
            </thead>
            <tbody id="trajectoryTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
